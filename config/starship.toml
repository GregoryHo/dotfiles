"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
scan_timeout = 30
command_timeout = 500

palette = 'kanagawa_wave'

format = """
$username\
$hostname\
$shlvl\
$directory\
$git_branch\
$git_status\
$git_state\
$line_break\
$character"""

right_format = """\
$status\
$cmd_duration\
$jobs\
$direnv\
$time\
$battery"""

[palettes.kanagawa_wave]
bg     = '#1f1f28'
fg     = '#dcd7ba'
fg_dim = '#727169'
blue   = '#7e9cd8'
cyan   = '#7fb4ca'
green  = '#76946a'
yellow = '#c0a36e'
orange = '#ffa066'
red    = '#c34043'
purple = '#957fb8'
pink   = '#d27e99'

[character]
format = '╰─$symbol '
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold yellow)'

[directory]
truncation_length = 3
truncate_to_repo = true
style = 'bold cyan'

[git_branch]
symbol = ' '
style = 'bold purple'

[git_status]
style = 'bold yellow'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
modified = '!${count}'
staged = '+${count}'
deleted = '✘${count}'
untracked = '?${count}'
stashed = '*${count}'
conflicted = '=${count}'

[hostname]
ssh_only = true
format = '[@$hostname]($style) '
style = 'bold green'

[username]
show_always = false
format = '[$user]($style) '
style_user = 'bold yellow'
style_root = 'bold red'

[shlvl]
disabled = false
threshold = 2
symbol = '↕'
format = '[$symbol$shlvl ]($style)'
style = 'bold red'

[status]
disabled = false
symbol = '✘'
style = 'bold red'
format = '[$symbol $common_meaning$signal_name$maybe_int]($style) '

[cmd_duration]
min_time = 2000
format = '[ $duration]($style) '
style = 'yellow'

[jobs]
symbol = '✦'
threshold = 1
style = 'bold blue'

[direnv]
disabled = false
format = '[direnv $loaded/$allowed]($style) '
style = 'bold orange'

[time]
disabled = false
format = '[$time]($style) '
time_format = '%H:%M'
style = 'fg_dim'

[battery]
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 '

[[battery.display]]
threshold = 20
style = 'bold red'

[[battery.display]]
threshold = 50
style = 'yellow'

# Disable noisy default modules that p10k never showed.
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[ruby]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[lua]
disabled = true

[php]
disabled = true
