"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
scan_timeout = 30
command_timeout = 500

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$line_break\
$character"""

right_format = """\
$status\
$cmd_duration\
$jobs\
$direnv\
$time\
$battery"""

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold yellow)'

[directory]
truncation_length = 3
truncate_to_repo = true
style = 'bold cyan'

[git_branch]
symbol = ' '
style = 'bold purple'

[git_status]
style = 'bold yellow'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
modified = '!${count}'
staged = '+${count}'
deleted = '✘${count}'
untracked = '?${count}'
stashed = '*${count}'
conflicted = '=${count}'

[status]
disabled = false
symbol = '✘'
style = 'bold red'
format = '[$symbol $common_meaning$signal_name$maybe_int]($style) '

[cmd_duration]
min_time = 2000
format = '[ $duration]($style) '
style = 'yellow'

[jobs]
symbol = '✦'
threshold = 1
style = 'bold blue'

[direnv]
disabled = false
format = '[direnv $loaded/$allowed]($style) '
style = 'bold orange'

[time]
disabled = false
format = '[$time]($style) '
time_format = '%H:%M:%S'
style = 'white'

[battery]
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 '

[[battery.display]]
threshold = 20
style = 'bold red'

[[battery.display]]
threshold = 50
style = 'yellow'

# Disable noisy default modules that p10k never showed.
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[ruby]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[lua]
disabled = true

[php]
disabled = true
